<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Interactive mapping and correlation of environmental radioactivity with geological data in Greece."
    />
    <title>Environmental Radioactivity &amp; Geological Data Map</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
    />
    <link rel="stylesheet" href="vendor/leaflet-ruler/src/leaflet-ruler.css" />
    <link
      rel="stylesheet"
      href="vendor/leaflet-fullscreen/dist/leaflet.fullscreen.css"
    />
    <link rel="stylesheet" href="styles.css" />

    <script
      defer
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script
      defer
      src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"
    ></script>
    <script
      defer
      src="vendor/leaflet-ruler/src/leaflet-ruler.js"
    ></script>
    <script
      defer
      src="vendor/leaflet-fullscreen/dist/Leaflet.fullscreen.js"
    ></script>
    <script defer src="app.js"></script>
  </head>

  <body>
    <main id="map" aria-label="Interactive environmental radioactivity map">
      <output id="coordinate" aria-live="off"></output>
      <aside id="popupInfo" aria-label="Selected feature details"></aside>
      <img
        id="memorandum"
        src="assets/mem.png"
        alt="Geological map legend"
      />
      <aside id="legend" aria-label="Radon concentration legend">
        <strong>Bq/L</strong><br />
        <i style="background: #eef779"></i> 0–25<br />
        <i style="background: hsl(36, 89%, 52%)"></i> 25–50<br />
        <i style="background: #e93010"></i> 50–100<br />
        <i style="background: rgb(126, 4, 4)"></i> 100+
      </aside>
      <div id="loadingStatus" role="status" aria-live="polite"></div>
    </main>

    <noscript>This interactive map requires JavaScript.</noscript>
  </body>
</html>
